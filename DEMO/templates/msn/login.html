{% extends "msn/base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<main class="max-w-md mx-auto px-4 py-16">
    <div class="bg-msn-card rounded-xl border border-msn-gray p-8">
        <h1 class="text-2xl font-bold text-white mb-6">Sign in</h1>
        <form method="post" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Username</label>
                <input name="username" required class="w-full rounded-lg bg-gray-900 border border-msn-gray px-3 py-2 text-white" autocomplete="username" />
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required class="w-full rounded-lg bg-gray-900 border border-msn-gray px-3 py-2 text-white" autocomplete="current-password" />
            </div>
            <button type="submit" class="w-full py-2 rounded-full bg-blue-600 hover:bg-blue-500 font-semibold text-white">Sign in</button>
        </form>
        <p class="text-sm text-gray-500 mt-6 text-center">No account? <a href="{{ url_for('register') }}" class="text-blue-400 hover:underline">Register</a></p>
    </div>
</main>
{% endblock %}
